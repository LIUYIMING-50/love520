<head>

    <meta name="wx:shareDescription" content="在这个特别的日子里，想告诉你：你是我生命中最美的遇见">
    <meta name="wx:shareImage" content="https://neeko-copilot.bytedance.net/api/text_to_image?prompt=romantic%20red%20heart%20with%20rose%20petals%20floating%20on%20pink%20background%20love%20valentines%20day&image_size=square_hd">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ff6b9d 0%, #c44569 50%, #ff9ff3 100%);
            overflow: hidden;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .title {
            font-size: 4rem;
            color: #fff;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
            text-align: center;
        }

        .subtitle {
            font-size: 1.5rem;
            color: rgba(255,255,255,0.9);
            margin-bottom: 30px;
            text-align: center;
            letter-spacing: 5px;
        }

        .heart-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 30px auto;
        }

        .heart {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #ff4757;
            transform: rotate(-45deg);
            animation: heartbeat 1.5s ease-in-out infinite;
            box-shadow: 0 10px 40px rgba(255,71,87,0.4);
        }

        .heart::before,
        .heart::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: inherit;
            border-radius: 50%;
        }

        .heart::before {
            top: -50%;
            left: 0;
        }

        .heart::after {
            top: 0;
            left: 50%;
        }

        .message {
            font-size: 1.2rem;
            color: #fff;
            text-align: center;
            max-width: 300px;
            line-height: 1.8;
            margin-top: 20px;
        }

        .rose {
            position: absolute;
            font-size: 2rem;
            animation: float 4s ease-in-out infinite;
        }

        .rose:nth-child(1) { top: 10%; left: 10%; animation-delay: 0s; }
        .rose:nth-child(2) { top: 20%; right: 15%; animation-delay: 0.5s; }
        .rose:nth-child(3) { top: 60%; left: 20%; animation-delay: 1s; }
        .rose:nth-child(4) { top: 70%; right: 10%; animation-delay: 1.5s; }
        .rose:nth-child(5) { top: 30%; left: 5%; animation-delay: 2s; }
        .rose:nth-child(6) { top: 80%; right: 25%; animation-delay: 2.5s; }

        .floating-heart {
            position: absolute;
            color: #ff4757;
            font-size: 1.5rem;
            animation: floatUp 3s ease-out infinite;
            opacity: 0;
        }

        .stars {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 2s ease-in-out infinite;
        }

        .stars:nth-child(1) { top: 5%; left: 30%; animation-delay: 0s; }
        .stars:nth-child(2) { top: 15%; left: 70%; animation-delay: 0.3s; }
        .stars:nth-child(3) { top: 25%; left: 45%; animation-delay: 0.6s; }
        .stars:nth-child(4) { top: 35%; left: 85%; animation-delay: 0.9s; }
        .stars:nth-child(5) { top: 45%; left: 20%; animation-delay: 1.2s; }
        .stars:nth-child(6) { top: 55%; left: 60%; animation-delay: 1.5s; }
        .stars:nth-child(7) { top: 65%; left: 90%; animation-delay: 1.8s; }
        .stars:nth-child(8) { top: 75%; left: 35%; animation-delay: 2.1s; }

        .share-btn {
            margin-top: 30px;
            padding: 12px 30px;
            background: rgba(255,255,255,0.2);
            border: 2px solid #fff;
            border-radius: 50px;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .share-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.05);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes heartbeat {
            0%, 100% { transform: rotate(-45deg) scale(1); }
            50% { transform: rotate(-45deg) scale(1.1); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        @keyframes floatUp {
            0% { 
                transform: translateY(100vh) scale(0.5); 
                opacity: 0; 
            }
            10% { opacity: 1; }
            100% { 
                transform: translateY(-10vh) scale(1); 
                opacity: 0; 
            }
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .countdown {
            margin-top: 20px;
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
        }

        .footer {
            position: absolute;
            bottom: 20px;
            color: rgba(255,255,255,0.6);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 玫瑰花装饰 -->
        <div class="rose">🌹</div>
        <div class="rose">🌹</div>
        <div class="rose">🌹</div>
        <div class="rose">🌹</div>
        <div class="rose">🌹</div>
        <div class="rose">🌹</div>

        <!-- 星星装饰 -->
        <div class="stars"></div>
        <div class="stars"></div>
        <div class="stars"></div>
        <div class="stars"></div>
        <div class="stars"></div>
        <div class="stars"></div>
        <div class="stars"></div>
        <div class="stars"></div>

        <!-- 浮动爱心 -->
        <div class="floating-heart" id="heart1">❤️</div>
        <div class="floating-heart" id="heart2">❤️</div>
        <div class="floating-heart" id="heart3">❤️</div>
        <div class="floating-heart" id="heart4">❤️</div>
        <div class="floating-heart" id="heart5">❤️</div>

        <!-- 主标题 -->
        <h1 class="title">❤️ 520 ❤️</h1>
        <p class="subtitle">我爱你</p>

        <!-- 跳动的心 -->
        <div class="heart-container">
            <div class="heart"></div>
        </div>

        <!-- 浪漫文字 -->
        <div class="message">
            在这个特别的日子里<br>
            想告诉你：<br>
            你是我生命中最美的遇见 ❤️
        </div>

        <!-- 倒计时 -->
        <div class="countdown" id="countdown"></div>

        <!-- 分享按钮 -->
        <button class="share-btn" onclick="share()">💝 分享给心爱的人</button>

        <!-- 页脚 -->
        <div class="footer">Made with ❤️ for you</div>
    </div>

    <script>
        // 创建浮动爱心动画
        function createHearts() {
            const hearts = document.querySelectorAll('.floating-heart');
            hearts.forEach((heart, index) => {
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDelay = Math.random() * 3 + 's';
                heart.style.animationDuration = (3 + Math.random() * 2) + 's';
            });
        }

        // 倒计时功能
        function updateCountdown() {
            const targetDate = new Date('2025-05-20T00:00:00');
            const now = new Date();
            const diff = targetDate - now;

            if (diff > 0) {
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);
                document.getElementById('countdown').innerText = `距离520还有 ${days}天 ${hours}时 ${minutes}分 ${seconds}秒`;
            } else {
                document.getElementById('countdown').innerText = '❤️ 今天就是520！❤️';
            }
        }

        // 分享功能
        function share() {
            if (navigator.share) {
                navigator.share({
                    title: '520我爱你',
                    text: '在这个特别的日子里，想告诉你：你是我生命中最美的遇见 ❤️',
                    url: window.location.href
                });
            } else {
                // 复制链接到剪贴板
                const tempInput = document.createElement('input');
                tempInput.value = window.location.href;
                document.body.appendChild(tempInput);
                tempInput.select();
                document.execCommand('copy');
                document.body.removeChild(tempInput);
                alert('链接已复制到剪贴板！快去发给心爱的人吧 ❤️');
            }
        }

        // 页面加载完成后执行
        window.onload = function() {
            createHearts();
            updateCountdown();
            setInterval(updateCountdown, 1000);

            // 动态生成更多爱心
            setInterval(() => {
                const newHeart = document.createElement('div');
                newHeart.className = 'floating-heart';
                newHeart.innerText = '❤️';
                newHeart.style.left = Math.random() * 100 + '%';
                newHeart.style.animationDuration = (3 + Math.random() * 2) + 's';
                document.body.appendChild(newHeart);
                
                setTimeout(() => {
                    newHeart.remove();
                }, 5000);
            }, 1500);
        };
    </script>
</body>
</html>
